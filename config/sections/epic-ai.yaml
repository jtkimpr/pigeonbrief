    - name: "데일리메디"
      url: "https://www.dailymedi.com/rss/allArticle.xml"

channel3_keywords:
  queries:
    - 'Epic Systems AND (AI OR agent OR "machine learning")'
    - 'EHR AND (AI OR automation) AND hospital'
    - '"digital health" AND (AI OR platform) AND (revenue OR growth)'
    - '유비케어 OR "GC메디아이"'
