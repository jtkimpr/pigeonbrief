<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PigeonBrief</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <link rel="stylesheet" href="assets/style.css?v=3">
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>PigeonBrief</h1>
        <p class="subtitle" id="generated-at"></p>
      </div>
      <button class="btn-settings" onclick="openSettingsForCurrent()" title="현재 섹션 설정">⚙️</button>
    </div>
  </header>

  <nav id="section-tabs"></nav>

  <main id="card-grid"></main>

  <!-- 설정 패널 (오버레이) -->
  <div id="settings-panel" style="display:none">
    <div class="settings-modal">
      <div class="settings-modal-header">
        <span class="settings-title">설정</span>
        <button class="btn-icon settings-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="settings-modal-body" id="settings-body"></div>
    </div>
  </div>

  <script src="assets/app.js?v=3"></script>
  <script src="assets/settings.js?v=3"></script>
</body>
</html>
